<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Tracery Studio</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
		integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8oTH7h8w2f2I1jXn/tWtIaxVXMmY8mA=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="css/layout.css" />
</head>

<body>
	<div id="app">
		<section class="toolbar" aria-label="Controls">
			<div class="toolbarTitle">Tracery Studio</div>
			<button id="applyCustomGrammar" type="button"><i class="fa-solid fa-rotate"
					aria-hidden="true"></i><span>Roll</span></button>
			<button id="saveToUrl" type="button"><i class="fa-solid fa-link" aria-hidden="true"></i><span>Share
					URL</span></button>
			<div id="shareSyncStatus" class="toolbarSyncStatus" role="status" aria-live="polite">saved</div>
			<button id="loadJsonButton" type="button"><i class="fa-solid fa-file-import"
					aria-hidden="true"></i><span>Import JSON</span></button>
			<button id="exportJson" type="button"><i class="fa-solid fa-file-export" aria-hidden="true"></i><span>Export
					JSON</span></button>
			<button id="toggleEditorSize" type="button"><i class="fa-solid fa-table-columns"
					aria-hidden="true"></i><span>Layout: 50/50</span></button>
			<button id="toggleVerticalSplit" type="button"><i class="fa-solid fa-grip-lines-vertical"
					aria-hidden="true"></i><span>VSplit: 50/50</span></button>
			<label class="toolbarToggle" for="autoRerollOnType">
				<input id="autoRerollOnType" type="checkbox" />
				<span>AutoRoll on valid JSON</span>
			</label>
			<button id="openConfig" type="button"><i class="fa-solid fa-gear"
					aria-hidden="true"></i><span>Config</span></button>
			<input id="jsonFileInput" type="file" accept="application/json,.json" hidden />
		</section>

		<section class="workspace" id="workspace">
			<section class="editorPane" id="editorDropZone">
				<div class="editorStack">
					<div class="traceryEditorBlock">
						<div class="editorBlockHeader">
							<div class="editorBlockTitle">Grammar JSON</div>
							<button id="formatJson" type="button"><i class="fa-solid fa-brackets-curly"
									aria-hidden="true"></i><span>Format</span></button>
						</div>
						<div id="jsonDebug" class="jsonDebug" role="status" aria-live="polite"></div>
						<div class="editorSurface">
							<div id="lineNumbers" class="lineNumbers" aria-hidden="true"></div>
							<div class="editorInputWrap">
								<div id="customGrammarInput" class="jsonEditor" role="textbox" aria-multiline="true"
									aria-label="Custom grammar JSON" contenteditable="true" spellcheck="false"></div>
							</div>
						</div>
					</div>
					<div class="cssEditorBlock">
						<div class="editorBlockHeader">
							<div class="editorBlockTitle">Output CSS</div>
							<button id="formatCss" type="button"><i class="fa-brands fa-css3-alt"
									aria-hidden="true"></i><span>Format</span></button>
						</div>
						<div id="cssDebug" class="jsonDebug cssDebug" role="status" aria-live="polite"></div>
						<div class="cssEditorSurface">
							<div id="cssLineNumbers" class="lineNumbers" aria-hidden="true"></div>
							<div class="editorInputWrap">
								<div id="outputCssInput" class="cssEditorInput" role="textbox" aria-multiline="true"
									aria-label="Output CSS" contenteditable="true" spellcheck="false"></div>
							</div>
						</div>
					</div>
				</div>
			</section>

			<section class="previewPane">
				<div id="output" class="panel" data-placeholder="This is where your work will appear."></div>
			</section>
		</section>
	</div>

	<div id="configModal" class="modal isHidden" role="dialog" aria-modal="true" aria-labelledby="configTitle">
		<div class="modalCard">
			<h2 id="configTitle">Configuration</h2>
			<label class="modalRow">
				<span>Theme</span>
				<select id="themePreference">
					<option value="system">System</option>
					<option value="light">Light</option>
					<option value="dark">Dark</option>
				</select>
			</label>
			<label class="modalRow">
				<input id="openLinksInNewTab" type="checkbox" checked />
				<span>Open rendered links in a new tab</span>
			</label>
			<div class="modalActions">
				<button id="closeConfig" type="button">Close</button>
			</div>
		</div>
	</div>

	<script type="module" src="js/app.js"></script>
</body>

</html>
